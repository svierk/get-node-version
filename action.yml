name: 'Get Node Version'
description: 'Pulls the Node.js version to be used from the package.json file of a project.'

branding:
  icon: 'search'
  color: 'green'

inputs:
  path:
    description: 'Specify the path where the package.json file can be found.'
    required: false
    default: './'
  package-manager:
    description: 'Specify the package manager to be used. Supported values: npm, yarn, pnpm'
    required: false
    default: 'npm'
  step-summary:
    description: 'Write a result section to the GitHub Actions job summary. Set to false to avoid collisions with a custom workflow summary.'
    required: false
    default: 'true'

outputs:
  node-version:
    description: 'The Node.js version resolved from the package.json engines field.'
    value: ${{ steps.resolve.outputs.node-version }}

runs:
  using: composite
  steps:
    - name: Get Node.js Version
      id: resolve
      shell: bash
      env:
        INPUT_PATH: ${{ inputs.path }}
        PACKAGE_MANAGER: ${{ inputs.package-manager }}
      run: |
        set -euo pipefail

        # Normalise the path so it always ends with a single trailing slash.
        path="${INPUT_PATH%/}/"
        package_json="${path}package.json"

        if [[ ! -f "$package_json" ]]; then
          echo "::error::No package.json found at '$package_json'."
          exit 1
        fi

        node_version=$(jq -r '.engines.node // empty' "$package_json")
        if [[ -z "$node_version" ]]; then
          echo "::error::No 'engines.node' field found in '$package_json'."
          exit 1
        fi

        case "$PACKAGE_MANAGER" in
          npm)  lock_file="${path}package-lock.json" ;;
          yarn) lock_file="${path}yarn.lock" ;;
          pnpm) lock_file="${path}pnpm-lock.yaml" ;;
          *)
            echo "::error::Unsupported package manager '$PACKAGE_MANAGER'. Supported values: npm, yarn, pnpm."
            exit 1
            ;;
        esac

        echo "Resolved Node.js version spec: $node_version"
        {
          echo "node-version=$node_version"
          echo "lock-file=$lock_file"
        } >> "$GITHUB_OUTPUT"
    - name: Use Node.js ${{ steps.resolve.outputs.node-version }}
      id: setup
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.resolve.outputs.node-version }}
        check-latest: true
        cache: ${{ inputs.package-manager }}
        cache-dependency-path: ${{ steps.resolve.outputs.lock-file }}
    - name: Write job summary
      if: ${{ inputs.step-summary == 'true' }}
      shell: bash
      env:
        VERSION_SPEC: ${{ steps.resolve.outputs.node-version }}
        INSTALLED_VERSION: ${{ steps.setup.outputs.node-version }}
      run: |
        set -euo pipefail

        echo "Installed Node.js version: $INSTALLED_VERSION (spec: $VERSION_SPEC)"
        {
          echo ""
          echo "### 🕵🏻 Node.js version"
          echo ""
          echo "- **Installed:** \`$INSTALLED_VERSION\`"
          echo "- **Spec:** \`$VERSION_SPEC\`"
          echo ""
        } >> "$GITHUB_STEP_SUMMARY"
